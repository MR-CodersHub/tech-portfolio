<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Harish Ragav Kumar S</title>
    <link rel="icon" href="../../assets/img/favicon.png">
    <meta name="description" content="Admin portal login">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../src/css/style.css">
    <link rel="stylesheet" href="../../src/css/extended-styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1><i class="fas fa-shield-alt"></i> Admin Portal</h1>
                <p>Secure administrative access</p>
            </div>

            <form id="adminLoginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Admin Email</label>
                    <input type="email" id="email" name="email" placeholder="admin@gmail.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Admin Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter admin password" required>
                </div>

                <button type="submit">
                    <i class="fas fa-lock"></i> Secure Login
                </button>
            </form>

            <div class="auth-footer">
                <p><a href="../../index.html">← Back to Home</a></p>
            </div>
        </div>
    </div>

    <script src="../../src/js/auth.js"></script>
    <script src="../../src/js/toast.js"></script>
    <script>
        // Handle admin login form submission
        document.getElementById('adminLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = {
                email: document.getElementById('email').value.trim(),
                password: document.getElementById('password').value
            };

            // Basic validation
            if (!formData.email || !formData.password) {
                toast.error('Please fill in all fields');
                return;
            }

            // Check admin credentials
            if (formData.email !== 'admin@gmail.com' || formData.password !== 'admin123') {
                toast.error('Invalid admin credentials');
                return;
            }

            // Attempt login
            const result = authManager.login(formData.email, formData.password, 'admin');

            if (result.success && result.role === 'admin') {
                toast.success('✅ Admin login successful! Redirecting...');
                setTimeout(() => {
                    window.location.href = '../../dashboards/admin-dashboard.html';
                }, 1000);
            } else {
                toast.error('Access denied. Admin credentials required.');
            }
        });
    </script>
</body>

</html>
