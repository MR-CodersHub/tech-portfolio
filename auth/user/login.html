<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Harish Ragav Kumar S</title>
    <link rel="icon" href="../../assets/img/favicon.png">
    <meta name="description" content="Login to access your personal dashboard">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../src/css/style.css">
    <link rel="stylesheet" href="../../src/css/extended-styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Login to access your dashboard</p>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="your.email@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required>
                </div>

                <button type="submit">Login</button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a href="signup.html">Sign up here</a></p>
                <p style="margin-top: 1rem;"><a href="../../index.html">← Back to Home</a></p>
            </div>
        </div>
    </div>

    <script src="../../src/js/auth.js"></script>
    <script src="../../src/js/toast.js"></script>
    <script>
        // Handle login form submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = {
                email: document.getElementById('email').value.trim(),
                password: document.getElementById('password').value
            };

            // Basic validation
            if (!formData.email || !formData.password) {
                toast.error('Please fill in all fields');
                return;
            }

            // Email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(formData.email)) {
                toast.error('Please enter a valid email address');
                return;
            }

            // Attempt login
            const result = authManager.login(formData.email, formData.password);

            if (result.success) {
                toast.success('✅ Login successful! Redirecting...');

                // Redirect based on role after a short delay
                setTimeout(() => {
                    if (result.role === 'admin') {
                        window.location.href = '../../dashboards/admin-dashboard.html';
                    } else {
                        window.location.href = '../../dashboards/user-dashboard.html';
                    }
                }, 1000);
            } else {
                toast.error(result.message || 'Invalid email or password');
            }
        });
    </script>
</body>

</html>
